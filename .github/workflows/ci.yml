name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Backend unit — lint + types + the full suite with NO infra. The infra
  #    tests (DB/Redis/S3) skip cleanly; the concurrency buffer-health load test
  #    is infra-free and runs here too.
  # ---------------------------------------------------------------------------
  backend-unit:
    name: Backend unit (ruff + mypy + pytest, no infra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DASHSCOPE_API_KEY: test
      APP_ENV: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check app tests scripts
      - name: Mypy (types)
        run: mypy app
      - name: Pytest (no infra → infra tests skip)
        run: pytest -q

  # ---------------------------------------------------------------------------
  # 0. Apps — the pnpm/Turborepo monorepo: typecheck the shared core + both
  #    shells, run the core unit tests, and build the Electron renderer. Mobile
  #    is typecheck-only here; device/simulator e2e runs elsewhere (EAS/Maestro).
  # ---------------------------------------------------------------------------
  apps:
    name: Apps (core + desktop + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck (core + desktop + mobile)
        run: |
          pnpm run typecheck
          pnpm --filter @kinora/desktop run typecheck
          pnpm --filter @kinora/mobile run typecheck
      - name: Test (core)
        run: pnpm --filter @kinora/core run test
      - name: Build (desktop renderer + main)
        run: pnpm --filter @kinora/desktop run build

  # ---------------------------------------------------------------------------
  # 2. Backend integration — Postgres(+pgvector) + Redis + MinIO as service
  #    containers; alembic upgrade head; the FULL suite incl. DB/Redis/S3 tests
  #    and the load test. Live DashScope tests stay gated off (KINORA_LIVE_TESTS
  #    unset) and KINORA_LIVE_VIDEO is off, so nothing spends model credits.
  # ---------------------------------------------------------------------------
  backend-integration:
    name: Backend integration (Postgres + Redis + MinIO)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: local
      # A real key may be injected from a secret; with KINORA_LIVE_TESTS unset
      # the live smokes still skip, so this never spends credits.
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY != '' && secrets.DASHSCOPE_API_KEY || 'test' }}
      KINORA_LIVE_VIDEO: "0"
      JWT_SECRET: kinora-ci-jwt-secret-which-is-comfortably-32-bytes
      # alembic + the app read these:
      DATABASE_URL: postgresql+asyncpg://kinora:kinora@localhost:5432/kinora
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: kinora
      S3_SECRET_KEY: kinora-secret
      S3_BUCKET: kinora
      S3_REGION: us-east-1
      # the conftest fixtures read these to enable the infra-bound tests:
      KINORA_TEST_DATABASE_URL: postgresql+asyncpg://kinora:kinora@localhost:5432/kinora
      KINORA_TEST_REDIS_URL: redis://localhost:6379/0
      KINORA_TEST_S3_ENDPOINT_URL: http://localhost:9000
      KINORA_TEST_S3_ACCESS_KEY: kinora
      KINORA_TEST_S3_SECRET_KEY: kinora-secret
      KINORA_TEST_S3_BUCKET: kinora
      KINORA_TEST_S3_REGION: us-east-1
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kinora
          POSTGRES_PASSWORD: kinora
          POSTGRES_DB: kinora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kinora -d kinora"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: kinora
          MINIO_ROOT_PASSWORD: kinora-secret
          MINIO_DEFAULT_BUCKETS: kinora
        ports: ["9000:9000", "9001:9001"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "minio ready"; exit 0
            fi
            sleep 2
          done
          echo "minio never became ready" >&2; exit 1
      - name: Alembic upgrade head
        run: alembic -c alembic.ini upgrade head
      - name: Pytest (full suite incl. DB/Redis/S3 + load test)
        run: pytest -q

  # ---------------------------------------------------------------------------
  # 3. Frontend — install, lint, type-check + build, unit tests (vitest).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint, build, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (tsc + vite)
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test --if-present

  # ---------------------------------------------------------------------------
  # 4. End-to-end — build the frontend, bring up the stack (Postgres + Redis +
  #    MinIO services + the API), seed the deterministic book, install the
  #    Playwright browser, and run the e2e suite against the real UI ↔ API.
  #    No live ingest / video: the book is seeded directly (seconds, no spend).
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright against the real stack)
    runs-on: ubuntu-latest
    env:
      APP_ENV: local
      DASHSCOPE_API_KEY: test
      KINORA_LIVE_VIDEO: "0"
      JWT_SECRET: kinora-ci-jwt-secret-which-is-comfortably-32-bytes
      DATABASE_URL: postgresql+asyncpg://kinora:kinora@localhost:5432/kinora
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: kinora
      S3_SECRET_KEY: kinora-secret
      S3_BUCKET: kinora
      S3_REGION: us-east-1
      # the dev-server proxy target + the event publisher target for the specs:
      KINORA_API_TARGET: http://localhost:8000
      KINORA_REDIS_HOST: 127.0.0.1
      KINORA_REDIS_PORT: "6379"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kinora
          POSTGRES_PASSWORD: kinora
          POSTGRES_DB: kinora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kinora -d kinora"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: kinora
          MINIO_ROOT_PASSWORD: kinora-secret
          MINIO_DEFAULT_BUCKETS: kinora
        ports: ["9000:9000", "9001:9001"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "minio ready"; exit 0
            fi
            sleep 2
          done
          echo "minio never became ready" >&2; exit 1

      - name: Migrate
        working-directory: backend
        run: alembic -c alembic.ini upgrade head

      - name: Start the API
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/kinora-api.log 2>&1 &
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "api ready"; exit 0
            fi
            sleep 1
          done
          echo "--- api log ---"; cat /tmp/kinora-api.log; echo "api never became ready" >&2; exit 1

      - name: Seed the deterministic e2e book
        working-directory: backend
        run: python scripts/seed_e2e.py

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/.artifacts/report
          if-no-files-found: ignore
          retention-days: 7

      - name: API log (on failure)
        if: ${{ failure() }}
        run: cat /tmp/kinora-api.log || true
