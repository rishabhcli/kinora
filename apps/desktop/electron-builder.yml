appId: app.kinora.desktop
productName: Kinora
copyright: Kinora
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.entertainment
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization: set `notarize: true` and provide APPLE_ID,
  # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID in CI. The signing identity is
  # taken from CSC_LINK / CSC_KEY_PASSWORD (base64 .p12 + password).
  notarize: false
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  # Windows signing: provide CSC_LINK (base64 .pfx) + CSC_KEY_PASSWORD in CI.
linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  artifactName: ${productName}-${version}-${arch}.${ext}
