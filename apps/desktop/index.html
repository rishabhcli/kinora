<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinora — Where Stories Come to Life</title>
    <meta name="description" content="Kinora is a digital reading platform where books come to life. Read, watch cinematic adaptations, and explore your personal library." />
    <meta name="theme-color" content="#0b0a08" />
    <meta property="og:title" content="Kinora — Where Stories Come to Life" />
    <meta property="og:description" content="A digital reading platform where books come to life." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Type system (Agent 08): Fraunces = cinematic display serif,
         Newsreader = book-quality reading serif, DM Sans = cross-platform UI
         fallback (UI is system-first / SF Pro on macOS). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
    />
  </head>
  <body>
    <!-- Liquid Glass refraction filter (Chromium honours SVG filters behind
         backdrop-filter; WebKit/Firefox ignore the url() and keep the blur).
         feTurbulence drives a gentle feDisplacementMap so the backdrop bends
         like real glass instead of just blurring. -->
    <svg aria-hidden="true" width="0" height="0" style="position: absolute; pointer-events: none">
      <defs>
        <filter id="lg-refract" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.009 0.012" numOctaves="2" seed="7" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="2.2" result="softNoise" />
          <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="16" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <filter id="lg-refract-strong" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="2" seed="11" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="3" result="softNoise" />
          <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="26" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <style>
      body { margin: 0; background: #0a0908; }
      #root { min-height: 100vh; }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
