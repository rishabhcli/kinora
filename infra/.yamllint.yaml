# yamllint config for infra/ YAML (compose, prometheus, helm values, k8s, ...).
# Helm templates under k8s/helm/*/templates are NOT plain YAML (Go templating),
# so they're ignored here and validated instead by `helm lint` + kubeconform.

extends: default

ignore: |
  **/templates/**
  **/.terraform/**
  **/charts/**

rules:
  document-start: disable
  line-length:
    max: 160
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    # Allow on/off/yes/no where they're idiomatic (GitHub Actions `on:` etc.).
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
