# Kinora local stack — the real process model (kinora.md §6).
#
# Data plane:  postgres (pgvector) + redis + minio (+ one-shot bucket bootstrap)
# Schema:      migrate (one-shot `alembic upgrade head`, runs before the app)
# App plane:   api (FastAPI; runs the Scheduler in-process + the idle-sweeper and
#              triggers Phase-A ingest as a background task on upload),
#              render-worker (`python -m app.queue.worker`, drains the Redis
#              priority queue and runs the real per-shot pipeline / degradation
#              ladder), mcp (`python -m app.mcp.run --http`, the canon-memory
#              MCP server), frontend, prometheus.
#
# NOTE on services that DON'T exist as separate processes (kept honest):
#   * scheduler  — there is no standalone scheduler process: the Scheduler control
#                  plane runs IN-PROCESS in `api` (driven by the intent/seek
#                  endpoints + a background idle-sweeper, §4.7/§4.9).
#   * ingest     — ingest also runs IN-PROCESS in `api` (a background task spawned
#                  on PDF upload, §9.1). A one-shot CLI exists for re-ingest:
#                  `docker compose run --rm api python -m app.ingest.worker <book_id>`.
#
# Usage (from infra/):
#   docker compose build
#   docker compose up -d                 # brings up data plane, runs migrate, starts app
#   docker compose run --rm migrate      # (re-)apply migrations on demand
#   docker compose config -q             # validate this file

name: kinora

# Shared definition for every service built from the backend image. The workers,
# the API, the MCP server, and the one-shot migrate job reuse this; only their
# `command` and `depends_on` differ.
x-backend: &backend
  build:
    context: ..
    dockerfile: infra/docker/backend.Dockerfile
  image: kinora-backend:local
  # backend/.env holds the real DashScope key + KINORA_LIVE_VIDEO locally; optional
  # so the config still validates (and CI/cloud can inject env another way) when
  # it's absent.
  env_file:
    - path: ../backend/.env
      required: false
  environment:
    # Override the localhost defaults with in-network service hostnames.
    DATABASE_URL: postgresql+asyncpg://kinora:kinora@postgres:5432/kinora
    REDIS_URL: redis://redis:6379/0
    S3_ENDPOINT_URL: http://minio:9000
    # Local-only DEV values for the auth model (real secrets are injected by
    # Terraform/cloud-init in cloud — see infra/terraform). NOT for production.
    #   * MCP_AUTH_TOKEN: bearer the mcp server requires and the api/worker send.
    #   * CORS_ORIGINS:   the local frontend origin (comma list; no wildcard).
    #   * JWT_SECRET:     dev signing key (APP_ENV stays "local" so any value is ok).
    MCP_AUTH_TOKEN: kinora-local-dev-mcp-token
    CORS_ORIGINS: http://localhost:5173
    JWT_SECRET: kinora-local-dev-jwt-secret
  networks:
    - kinora

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kinora
      POSTGRES_PASSWORD: kinora
      POSTGRES_DB: kinora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinora -d kinora"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kinora
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - kinora
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: kinora
      MINIO_ROOT_PASSWORD: kinora-secret
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - miniodata:/data
    healthcheck:
      # MinIO exposes a liveness probe at /minio/health/live (curl ships in the image).
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - kinora
    restart: unless-stopped

  # One-shot: wait for MinIO and create the kinora bucket idempotently.
  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set kinora http://minio:9000 kinora kinora-secret; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing kinora/kinora
        # Public read keeps signed-URL plumbing optional for local dev; flip to
        # `mc anonymous set none` to keep the bucket private.
        mc anonymous set download kinora/kinora || true
        echo "minio bootstrap complete"
    networks:
      - kinora
    restart: "no"

  # One-shot: apply the Alembic schema (the image WORKDIR /app holds alembic.ini +
  # migrations/). The app services wait for this to finish before they start.
  migrate:
    <<: *backend
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # The runtime image has no curl; use the bundled Python stdlib instead.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # The real render worker: drains the Redis priority queue, runs the per-shot
  # render pipeline, and (with KINORA_LIVE_VIDEO off / under budget pressure)
  # steps down the real ffmpeg degradation ladder. Scale with `--scale render-worker=N`.
  render-worker:
    <<: *backend
    command: ["python", "-m", "app.queue.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # The MCP canon-memory server over streamable-HTTP (the §8.3 tool surface).
  mcp:
    <<: *backend
    command: ["python", "-m", "app.mcp.run", "--http", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    image: kinora-frontend:local
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kinora
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kinora
    restart: unless-stopped

networks:
  kinora:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
