# Alertmanager routing for Kinora. The default receiver is a no-op "null" sink so
# the stack runs cleanly out of the box; wire a real Slack/webhook/email receiver
# by filling in the commented blocks (and reference it from the routes).

global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts (API down, budget exhausted, spend-with-gate-off) page fast.
    - receiver: "null"
      matchers:
        - severity = "critical"
      group_wait: 10s
      repeat_interval: 1h
    # Warnings batch more loosely.
    - receiver: "null"
      matchers:
        - severity =~ "warning|info"

receivers:
  - name: "null"

  # --- Fill these in to actually notify ------------------------------------- #
  # - name: "slack"
  #   slack_configs:
  #     - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  #       channel: "#kinora-alerts"
  #       title: "{{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
  #       text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
  # - name: "webhook"
  #   webhook_configs:
  #     - url: "http://example.internal/alerts"

inhibit_rules:
  # A critical alert silences the matching warning for the same alertname.
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["alertname"]
