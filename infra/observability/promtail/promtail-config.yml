# Promtail — tails Docker container logs and ships them to Loki, labelled by the
# Kinora service/role so logs are filterable per role (api/render-worker/...).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover all running containers via the Docker socket.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # The compose project label keeps us to the Kinora stack.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: kinora
        action: keep
      # Service name (api, render-worker, mcp, ...) becomes the `role` label.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: role
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - target_label: stack
        replacement: kinora
    pipeline_stages:
      - docker: {}
