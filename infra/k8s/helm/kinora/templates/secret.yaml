{{- /* Chart-managed Secret for simple installs. For prod, set
       secrets.create=false and secrets.existingSecret to a Secret synced by
       External Secrets Operator / Vault / a cloud secrets store. */ -}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kinora.secretName" . }}
  labels:
    {{- include "kinora.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
