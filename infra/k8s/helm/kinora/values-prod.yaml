# Prod overlay: HA replicas, autoscaling on, externally-managed Secret, Ingress +
# TLS, ServiceMonitor on, NetworkPolicies enforced.
# helm install kinora ./kinora -f values.yaml -f values-prod.yaml

config:
  APP_ENV: "production"
  KINORA_LIVE_VIDEO: "false" # deliberate opt-in only
  CORS_ORIGINS: "https://app.kinora.example.com"

# Do NOT commit real secrets. Point at an External-Secrets / Vault-synced Secret.
secrets:
  create: false
  existingSecret: "kinora-runtime-secrets"

ingress:
  enabled: true
  className: "nginx"
  host: "app.kinora.example.com"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300" # SSE/WS streams
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  tls:
    enabled: true
    secretName: "kinora-tls"

metrics:
  serviceMonitor:
    enabled: true
    interval: 15s

networkPolicy:
  enabled: true

roles:
  api:
    replicas: 3
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
    pdb:
      enabled: true
      minAvailable: 2
  frontend:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
  render-worker:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      queueDepth:
        enabled: false # enable once prometheus-adapter exposes the metric
    pdb:
      enabled: true
      maxUnavailable: 1
  ingest-worker:
    replicas: 1
  mcp:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
