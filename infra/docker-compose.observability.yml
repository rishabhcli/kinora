# Kinora observability layer — Alertmanager + Loki + Promtail + Grafana + an
# OpenTelemetry collector. Layers ON TOP of the base stack; the base stack already
# runs Prometheus. Bring it up with:
#
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# This file ADDS to the base `prometheus` service (mounts the rule files) and adds
# the new components. It changes nothing the other domains' services depend on.

name: kinora

services:
  # Extend the base Prometheus: mount the recording/alerting rule files so it can
  # evaluate them (the base prometheus.yml already references /etc/prometheus/rules).
  prometheus:
    volumes:
      - ./prometheus/rules:/etc/prometheus/rules:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - amdata:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - kinora
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    networks:
      - kinora
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Read-only access to the Docker socket + container logs for discovery/tailing.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - kinora
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/otel-collector-config.yml"]
    volumes:
      - ./observability/otel/otel-collector-config.yml:/etc/otel/otel-collector-config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter (app-derived metrics)
    networks:
      - kinora
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: kinora
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - kinora
    restart: unless-stopped

volumes:
  amdata:
  lokidata:
  grafanadata:
