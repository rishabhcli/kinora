# Alembic configuration for Kinora.
#
# `sqlalchemy.url` is intentionally left EMPTY: the real (async) URL is injected
# at runtime from Settings.database_url inside migrations/env.py, so the same
# config works locally, in Docker, and in the cloud without committing a DSN.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set in migrations/env.py from app.core.config.Settings
sqlalchemy.url =

# --- Logging ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
