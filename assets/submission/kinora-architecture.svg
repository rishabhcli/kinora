<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Kinora architecture</title>
  <desc id="desc">Kinora connects an Electron and browser reading room to a FastAPI scheduler, a six-agent Qwen production crew, an MCP canon memory server, hosted Wan video on DashScope, and Alibaba Cloud storage and data services.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .band-title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 22px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke-width: 2.5; rx: 16; }
      .box-title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 18px Arial, sans-serif; fill: #334155; }
      .flow { fill: none; stroke: #1f2937; stroke-width: 3; marker-end: url(#arrow); }
      .soft-flow { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .note { font: 700 20px Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>
  <rect class="bg" width="1800" height="1200"/>

  <text x="80" y="74" style="font: 800 48px Arial, sans-serif; fill:#0f172a;">Kinora: Qwen-powered AI showrunner for books</text>
  <text x="82" y="116" class="small">A page-synced reading room where agents adapt a book into vertical video just ahead of the reader.</text>

  <rect x="70" y="170" width="410" height="830" class="band"/>
  <text x="100" y="218" class="band-title">Reader Surface</text>
  <rect x="105" y="260" width="320" height="140" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="304" class="box-title">Electron + browser UI</text>
  <text x="130" y="338" class="box-text">PDF / book pane</text>
  <text x="130" y="366" class="box-text">Vertical film pane</text>
  <rect x="105" y="450" width="320" height="145" class="box" fill="#ecfccb" stroke="#65a30d"/>
  <text x="130" y="494" class="box-title">SyncEngine</text>
  <text x="130" y="528" class="box-text">scroll, dwell, playhead</text>
  <text x="130" y="556" class="box-text">word highlights + cues</text>
  <rect x="105" y="645" width="320" height="145" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="130" y="689" class="box-title">Director controls</text>
  <text x="130" y="723" class="box-text">comments on frames</text>
  <text x="130" y="751" class="box-text">style preferences</text>

  <rect x="545" y="170" width="500" height="830" class="band"/>
  <text x="575" y="218" class="band-title">Kinora Backend on Alibaba ECS</text>
  <rect x="590" y="260" width="380" height="132" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="620" y="302" class="box-title">FastAPI API</text>
  <text x="620" y="336" class="box-text">auth, sessions, upload, SSE</text>
  <rect x="590" y="430" width="380" height="132" class="box" fill="#fae8ff" stroke="#a21caf"/>
  <text x="620" y="472" class="box-title">Scheduler</text>
  <text x="620" y="506" class="box-text">watermark buffer</text>
  <text x="620" y="534" class="box-text">promotion, cancel, budget</text>
  <rect x="590" y="600" width="380" height="132" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="620" y="642" class="box-title">Queue workers</text>
  <text x="620" y="676" class="box-text">ingest recovery</text>
  <text x="620" y="704" class="box-text">render + degradation ladder</text>
  <rect x="590" y="770" width="380" height="132" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="620" y="812" class="box-title">MCP canon server</text>
  <text x="620" y="846" class="box-text">versioned story memory</text>
  <text x="620" y="874" class="box-text">preferences + shot cache keys</text>

  <rect x="1110" y="170" width="610" height="830" class="band"/>
  <text x="1140" y="218" class="band-title">Qwen Cloud + Data Plane</text>
  <rect x="1155" y="260" width="250" height="120" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1185" y="302" class="box-title">Showrunner</text>
  <text x="1185" y="336" class="box-text">plans + arbitrates</text>
  <rect x="1430" y="260" width="250" height="120" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1460" y="302" class="box-title">Adapter</text>
  <text x="1460" y="336" class="box-text">book to shot list</text>
  <rect x="1155" y="420" width="250" height="120" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1185" y="462" class="box-title">Continuity</text>
  <text x="1185" y="496" class="box-text">canon writes</text>
  <rect x="1430" y="420" width="250" height="120" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1460" y="462" class="box-title">Cinematographer</text>
  <text x="1460" y="496" class="box-text">camera + references</text>
  <rect x="1155" y="580" width="250" height="120" class="box" fill="#ffedd5" stroke="#ea580c"/>
  <text x="1185" y="622" class="box-title">DashScope / Wan</text>
  <text x="1185" y="656" class="box-text">hosted video render</text>
  <rect x="1430" y="580" width="250" height="120" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1460" y="622" class="box-title">Critic / QA</text>
  <text x="1460" y="656" class="box-text">Qwen vision review</text>
  <rect x="1155" y="760" width="250" height="120" class="box" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="1185" y="802" class="box-title">OSS</text>
  <text x="1185" y="836" class="box-text">clips, audio, frames</text>
  <rect x="1430" y="760" width="250" height="120" class="box" fill="#e2e8f0" stroke="#475569"/>
  <text x="1460" y="802" class="box-title">RDS + Tair</text>
  <text x="1460" y="836" class="box-text">pgvector + queues</text>

  <path class="flow" d="M425 330 C500 330 510 326 590 326"/>
  <path class="flow" d="M425 520 C505 520 510 496 590 496"/>
  <path class="flow" d="M780 392 L780 430"/>
  <path class="flow" d="M780 562 L780 600"/>
  <path class="flow" d="M970 666 C1045 666 1075 640 1155 640"/>
  <path class="flow" d="M1405 640 L1430 640"/>
  <path class="flow" d="M1280 700 L1280 760"/>
  <path class="flow" d="M1430 820 C1240 920 790 950 425 536"/>
  <path class="soft-flow" d="M970 836 C1045 836 1075 480 1155 480"/>
  <path class="soft-flow" d="M970 836 C1045 836 1075 320 1155 320"/>
  <path class="soft-flow" d="M1280 540 L1280 580"/>
  <path class="soft-flow" d="M1555 380 L1555 420"/>
  <path class="soft-flow" d="M1555 700 L1555 760"/>

  <rect x="78" y="1048" width="1644" height="88" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="110" y="1085" class="note">Why it matters for Track 2:</text>
  <text x="350" y="1085" class="small">the agent crew does not render a whole movie. It keeps a memory-backed canon, predicts the reader's next moments, spends Wan video seconds only on committed scenes, and stores accepted clips in OSS so re-reads are free.</text>
  <text x="110" y="1126" class="tiny">Cloud proof: ECS runs the API/workers/MCP; DashScope hosts Qwen/Wan calls; OSS stores generated media; RDS/Tair hold canon, queues, budget ledger, and recovery state.</text>
</svg>
